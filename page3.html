<style>
    * {margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background-color: pink;
        color: rgb(0, 0, 0);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        padding: 50px;
    }
    h1 {
        text-align: center;
        margin-bottom: 50px;
        color: rgb(255, 61, 94);
    }
    
    .image {
        display: flex;
        justify-content: center;
    }
    .image img {
        width: 350px;
        height: 220px;
        object-fit: cover;
        border-radius: 20px;
        border: 5px solid white;
       
    }
    .txt{
       text-align: center;
       font-weight: 900;
       color: rgb(0, 0, 0);
       border: 3px dashed rgb(255 0 43);
    }
    .text {
        background: rgba(255, 255, 255, .08);
        padding: 30px;
        border-radius: 20px;
        line-height: 30px;
        box-shadow: 0 0 20px rgba(255, 255, 255, .2);
    }
    .text h2 {
        color: rgb(255, 61, 94);
        margin-bottom: 15px;
    }
    .image,
    .text{
    opacity:0;
    transform:translateY(60px);
    animation:show 1s forwards;
}

.mybtn{
    background-color: rgb(255, 61, 94);
    color: white;
    border-radius: 10px;
    border: none;
    width: 105px;
    padding: 16px;
    font-weight: bold;
    font-size: 20px;
    margin-left: 1150px;
    margin-top: 85px;
}
.mybtn:hover{cursor: pointer;}

@keyframes show{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

     
  
</style>
